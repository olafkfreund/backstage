name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ '${{' }} github.ref {{ '}}' }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: nix flake check (fmt + validate + tflint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: nix flake check
        run: nix flake check --print-build-logs

      - name: terraform fmt -check
        run: nix develop --command terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: nix develop --command terraform init -backend=false

      - name: terraform validate
        run: nix develop --command terraform validate

      - name: tflint --init
        run: nix develop --command tflint --init

      - name: tflint
        run: nix develop --command tflint --recursive

      - name: backend-bootstrap validate
        run: |
          nix develop --command bash -c '
            cd backend-bootstrap
            terraform init -backend=false
            terraform validate
            terraform fmt -check -recursive
          '

