site_name: ${{ values.name }}
site_description: ${{ values.description }}
docs_dir: docs
plugins:
  - techdocs-core
nav:
  - Overview: index.md
  - Development: development.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
