apiVersion: v2
name: baseline
description: Baseline platform chart for ${{ values.name }} — Traefik ingress + cert-manager.
type: application
version: 0.1.0
appVersion: "1.0.0"
icon: https://avatars.githubusercontent.com/u/13629408?s=200&v=4
maintainers:
  - name: olafkfreund
    email: olaf@freundcloud.com
dependencies:
  - name: traefik
    version: "32.1.1"
    repository: "https://traefik.github.io/charts"
    condition: traefik.enabled
  - name: cert-manager
    version: "v1.16.1"
    repository: "https://charts.jetstack.io"
    alias: certManager
    condition: certManager.enabled
