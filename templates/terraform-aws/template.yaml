apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: terraform-aws
  title: Terraform for AWS (devenv + flake)
  description: |
    Production-ready Terraform 1.9+ scaffold targeting AWS with an S3 + DynamoDB
    remote state backend. Ships with a Nix flake + devenv shell pinning Terraform
    and the AWS CLI, a backend-bootstrap module to create the state bucket and
    lock table on first use, TechDocs, GitHub Actions CI (fmt/validate/tflint),
    and an AGENTS.md agent-conventions file.
  tags:
    - terraform
    - aws
    - infrastructure
    - iac
    - nix
    - devenv
spec:
  owner: olafkfreund
  type: service
  parameters:
    - title: Project metadata
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Name
          type: string
          description: Unique name for the Terraform project (lowercase, kebab-case).
          pattern: '^[a-z][a-z0-9-]{2,38}[a-z0-9]$'
          ui:autofocus: true
          ui:help: 4-40 chars, lowercase letters, digits, and hyphens. Used for repo name, state bucket, and lock table.
        description:
          title: Description
          type: string
          description: Short, human-readable description of what this stack provisions.
          minLength: 10
        owner:
          title: Owner
          type: string
          description: Group that owns this stack in the Backstage catalog.
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Group
        system:
          title: System
          type: string
          description: System this stack belongs to (optional).
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: System
          default: ''
    - title: AWS configuration
      required:
        - awsRegion
        - stateBucket
        - stateLockTable
      properties:
        awsRegion:
          title: AWS Region
          type: string
          description: Default AWS region the provider and backend will target.
          default: us-east-1
          enum:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
            - eu-west-1
            - eu-west-2
            - eu-west-3
            - eu-central-1
            - eu-north-1
            - ap-southeast-1
            - ap-southeast-2
            - ap-northeast-1
            - ap-northeast-2
            - ap-south-1
            - sa-east-1
            - ca-central-1
          enumNames:
            - 'US East (N. Virginia) - us-east-1'
            - 'US East (Ohio) - us-east-2'
            - 'US West (N. California) - us-west-1'
            - 'US West (Oregon) - us-west-2'
            - 'EU (Ireland) - eu-west-1'
            - 'EU (London) - eu-west-2'
            - 'EU (Paris) - eu-west-3'
            - 'EU (Frankfurt) - eu-central-1'
            - 'EU (Stockholm) - eu-north-1'
            - 'Asia Pacific (Singapore) - ap-southeast-1'
            - 'Asia Pacific (Sydney) - ap-southeast-2'
            - 'Asia Pacific (Tokyo) - ap-northeast-1'
            - 'Asia Pacific (Seoul) - ap-northeast-2'
            - 'Asia Pacific (Mumbai) - ap-south-1'
            - 'South America (Sao Paulo) - sa-east-1'
            - 'Canada (Central) - ca-central-1'
        stateBucket:
          title: Remote state S3 bucket
          type: string
          description: |
            Name of the S3 bucket that stores Terraform state. Must be globally
            unique across all AWS accounts. The backend-bootstrap module creates it.
          default: ${{ parameters.name }}-tfstate
          pattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
        stateLockTable:
          title: DynamoDB state lock table
          type: string
          description: |
            Name of the DynamoDB table used for state locking. The
            backend-bootstrap module creates it with a 'LockID' hash key.
          default: ${{ parameters.name }}-tflock
          pattern: '^[a-zA-Z0-9._-]{3,255}$'
    - title: Repository location
      required:
        - destination
      properties:
        destination:
          title: Repository location
          type: string
          description: GitHub repository that will host this Terraform stack.
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
  steps:
    - id: fetch-template
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          awsRegion: ${{ parameters.awsRegion }}
          stateBucket: ${{ parameters.stateBucket }}
          stateLockTable: ${{ parameters.stateLockTable }}
          destination: ${{ parameters.destination | parseRepoUrl }}
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.destination }}
        defaultBranch: main
        protectDefaultBranch: true
        deleteBranchOnMerge: true
        repoVisibility: private
    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: View source
        icon: github
        url: ${{ steps.publish.output.remoteUrl }}
    entityRef: ${{ steps.register.output.entityRef }}
    remoteUrl: ${{ steps.publish.output.remoteUrl }}
