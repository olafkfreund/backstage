name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ '{{' }} github.ref {{ '}}' }}
  cancel-in-progress: true

permissions:
  contents: read
  # Uncomment when wiring up OIDC for terraform plan against real AWS.
  # id-token: write

jobs:
  checks:
    name: lint + validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Nix flake check
        run: nix flake check --no-build

      - name: terraform fmt -check
        run: nix develop --command terraform fmt -check -recursive

      - name: terraform init (backend=false)
        run: nix develop --command terraform init -backend=false -input=false

      - name: terraform validate
        run: nix develop --command terraform validate -no-color

      - name: tflint --init
        run: nix develop --command tflint --init

      - name: tflint
        run: nix develop --command tflint --recursive --format=compact

