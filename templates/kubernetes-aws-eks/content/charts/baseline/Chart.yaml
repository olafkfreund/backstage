apiVersion: v2
name: baseline
description: |
  Baseline cluster services for ${{ values.name }}: Traefik (ingress) + cert-manager (TLS).
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: traefik
    version: "~30.0.0"
    repository: https://traefik.github.io/charts
    condition: traefik.enabled
  - name: cert-manager
    version: "~v1.15.0"
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled

maintainers:
  - name: ${{ values.owner }}
