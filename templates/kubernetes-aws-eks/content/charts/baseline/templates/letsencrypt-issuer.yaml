{{- if .Values.clusterIssuer.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuer.name }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
spec:
  acme:
    email: {{ required "letsEncryptEmail is required for the ClusterIssuer" .Values.letsEncryptEmail | quote }}
    server: {{ .Values.clusterIssuer.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.clusterIssuer.name }}-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.clusterIssuer.ingressClass | quote }}
{{- end }}
