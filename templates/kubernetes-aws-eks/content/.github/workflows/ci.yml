name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ '{{' }} github.workflow {{ '}}' }}-${{ '{{' }} github.ref {{ '}}' }}
  cancel-in-progress: true

jobs:
  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive infra

      - name: terraform init (no backend)
        working-directory: infra
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: infra
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint
        working-directory: infra
        run: |
          tflint --init
          tflint --recursive

  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: helm dependency update
        run: helm dependency update charts/baseline

      - name: helm lint
        run: helm lint charts/baseline

      - name: helm template
        run: helm template baseline charts/baseline > /tmp/baseline.yaml

      - name: Upload rendered manifest
        uses: actions/upload-artifact@v4
        with:
          name: baseline-rendered
          path: /tmp/baseline.yaml

  kubectl:
    name: kubectl dry-run (apps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.4

      - name: kubectl apply --dry-run=client (apps/example)
        run: kubectl apply --dry-run=client -f apps/example/
