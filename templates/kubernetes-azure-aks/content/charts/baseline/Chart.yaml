apiVersion: v2
name: baseline
description: Baseline platform chart for ${{ values.name }} — Traefik ingress + cert-manager TLS.
type: application
version: 0.1.0
appVersion: "1.0.0"
maintainers:
  - name: ${{ values.owner }}
dependencies:
  - name: traefik
    version: 32.1.1
    repository: https://traefik.github.io/charts
  - name: cert-manager
    version: v1.16.1
    repository: https://charts.jetstack.io
    alias: cert-manager
