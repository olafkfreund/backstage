# ACME contact email for Let's Encrypt — override per environment.
letsEncrypt:
  email: platform@example.com
  # Use "staging" until DNS is verified, then flip to "prod".
  server: prod

traefik:
  deployment:
    replicas: 2
  service:
    type: LoadBalancer
  ports:
    web:
      redirectTo:
        port: websecure
        priority: 10
    websecure:
      tls:
        enabled: true
  ingressClass:
    enabled: true
    isDefaultClass: true
  providers:
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: true
  logs:
    general:
      level: INFO
    access:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

cert-manager:
  installCRDs: true
  prometheus:
    enabled: false
  webhook:
    timeoutSeconds: 30
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
