{{- $server := .Values.letsEncrypt.server | default "prod" -}}
{{- $acmeServer := ternary "https://acme-staging-v02.api.letsencrypt.org/directory" "https://acme-v02.api.letsencrypt.org/directory" (eq $server "staging") -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-{{ $server }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  acme:
    email: {{ required "letsEncrypt.email is required" .Values.letsEncrypt.email | quote }}
    server: {{ $acmeServer | quote }}
    privateKeySecretRef:
      name: letsencrypt-{{ $server }}-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
