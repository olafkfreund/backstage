---
apiVersion: v1
kind: Namespace
metadata:
  name: example
  labels:
    app.kubernetes.io/part-of: ${{ values.name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: example-app
  namespace: example
  annotations:
    # Set to the clientId of the User-Assigned Managed Identity federated
    # against system:serviceaccount:example:example-app.
    # Terraform output: workload_identity_client_id
    azure.workload.identity/client-id: REPLACE_WITH_WORKLOAD_IDENTITY_CLIENT_ID
  labels:
    azure.workload.identity/use: "true"
