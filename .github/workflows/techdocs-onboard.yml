name: TechDocs onboard

# Adds a minimal mkdocs.yml + docs/index.md to repos that have
# catalog-info.yaml but no TechDocs scaffolding yet. Also updates
# catalog-info.yaml to add the `backstage.io/techdocs-ref: dir:.`
# annotation so Backstage's TechDocs tab knows where to build from.
#
# docs/index.md is seeded from the repo's README.md (verbatim) so day-1
# docs already have real content. If a repo has no README, a stub
# placeholder is used.
#
# Idempotent: skips repos that already have mkdocs.yml OR docs/index.md,
# or have an open techdocs onboarding PR.
#
# Requires the same BOT_PAT secret as catalog-onboard (Contents
# Read+Write, Pull requests Read+Write across olafkfreund's repos).

on:
  schedule:
    - cron: '37 6 * * *' # daily ~06:37 UTC (20 min after catalog-onboard)
  workflow_dispatch:
    inputs:
      max_prs:
        description: 'Maximum PRs to open in this run'
        required: false
        default: '20'
      dry_run:
        description: 'List repos to onboard but do not open PRs'
        required: false
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]

permissions:
  contents: read

concurrency:
  group: techdocs-onboard
  cancel-in-progress: false

jobs:
  onboard:
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'olafkfreund' }}
    env:
      GH_TOKEN: ${{ secrets.BOT_PAT }}
      MAX_PRS: ${{ github.event.inputs.max_prs || '20' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - name: Verify BOT_PAT is set
        run: |
          if [ -z "${{ secrets.BOT_PAT }}" ]; then
            echo "::error::BOT_PAT secret is not set."
            exit 1
          fi

      - name: Pick repos to onboard for TechDocs
        id: pick
        run: |
          set -euo pipefail
          gh repo list olafkfreund --limit 1000 \
            --json name,defaultBranchRef,description,isFork,isArchived,visibility \
            > all_repos.json

          # Shared exclude list (mirrors catalog-onboard filtering).
          EXCLUDES=$(grep -vE '^\s*(#|$)' .github/onboard-exclude.txt 2>/dev/null || true)

          jq -c '.[]' all_repos.json | while read -r repo; do
            name=$(jq -r '.name' <<<"$repo")
            default_branch=$(jq -r '.defaultBranchRef.name // "main"' <<<"$repo")
            is_archived=$(jq -r '.isArchived' <<<"$repo")
            is_fork=$(jq -r '.isFork' <<<"$repo")
            visibility=$(jq -r '.visibility' <<<"$repo")

            # Categorical + ad-hoc exclusions (must match catalog-onboard).
            [ "$is_archived" = "true" ] && continue
            [ "$is_fork" = "true" ] && continue
            [ "$visibility" = "PRIVATE" ] && continue
            if printf '%s\n' "$EXCLUDES" | grep -Fxq "$name"; then continue; fi

            # Skip if no catalog-info.yaml (must onboard catalog first)
            if ! gh api "repos/olafkfreund/$name/contents/catalog-info.yaml?ref=$default_branch" \
                 --silent 2>/dev/null; then
              continue
            fi

            # Skip if mkdocs.yml already present
            if gh api "repos/olafkfreund/$name/contents/mkdocs.yml?ref=$default_branch" \
                 --silent 2>/dev/null; then
              continue
            fi

            # Skip if docs/index.md already present
            if gh api "repos/olafkfreund/$name/contents/docs/index.md?ref=$default_branch" \
                 --silent 2>/dev/null; then
              continue
            fi

            # Skip if onboarding PR already open
            open_pr=$(gh pr list --repo "olafkfreund/$name" \
                       --state open --search 'in:title "onboard TechDocs"' \
                       --json number -q 'length' 2>/dev/null || echo 0)
            if [ "$open_pr" -gt 0 ]; then continue; fi

            echo "$repo"
          done > candidates.jsonl

          head -n "$MAX_PRS" candidates.jsonl > to_onboard.jsonl
          count=$(wc -l < to_onboard.jsonl)
          remaining=$(($(wc -l < candidates.jsonl) - count))
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "remaining=$remaining" >> "$GITHUB_OUTPUT"
          echo "::notice::TechDocs-onboarding $count repos this run; $remaining still pending."

      - name: Configure git identity for the bot
        if: ${{ steps.pick.outputs.count != '0' && env.DRY_RUN == 'false' }}
        run: |
          git config --global user.email "olaf@freundcloud.com"
          git config --global user.name "olafkfreund (techdocs onboard bot)"

      - name: Open onboarding PRs
        if: ${{ steps.pick.outputs.count != '0' && env.DRY_RUN == 'false' }}
        run: |
          set -euo pipefail
          while IFS= read -r repo; do
            name=$(jq -r '.name' <<<"$repo")
            default_branch=$(jq -r '.defaultBranchRef.name // "main"' <<<"$repo")
            description=$(jq -r '.description // ""' <<<"$repo")

            tmpdir=$(mktemp -d)
            trap 'rm -rf "$tmpdir"' EXIT

            if ! git clone --depth 1 \
                 "https://x-access-token:${GH_TOKEN}@github.com/olafkfreund/${name}.git" \
                 "$tmpdir/repo" 2>/dev/null; then
              echo "::warning::clone failed for $name (likely 403; skipping)"
              rm -rf "$tmpdir"
              trap - EXIT
              continue
            fi
            cd "$tmpdir/repo"

            # 1) mkdocs.yml
            cat > mkdocs.yml <<EOF
          # MkDocs config for Backstage TechDocs.
          # Edit at will — Backstage rebuilds on next view.
          # https://backstage.io/docs/features/techdocs/getting-started

          site_name: ${name}
          site_description: ${description:-${name}}

          docs_dir: docs

          plugins:
            - techdocs-core
          EOF

            # 2) docs/index.md — seed from README.md if present
            mkdir -p docs
            if [ -f README.md ]; then
              # Prepend a small banner so future readers know this is the
              # TechDocs entry point but README is still the source.
              {
                echo "<!-- This page is seeded from README.md. Edit either file;"
                echo "     they diverge by design after the initial onboarding. -->"
                echo
                cat README.md
              } > docs/index.md
            else
              cat > docs/index.md <<EOF
          # ${name}

          ${description:-Documentation for ${name} — coming soon.}

          This file was created by the TechDocs onboarding workflow because
          the repo had no \`README.md\` to seed from. Edit \`docs/index.md\`
          to start writing.
          EOF
            fi

            # 3) Add the techdocs-ref annotation to catalog-info.yaml
            if grep -q "backstage.io/techdocs-ref" catalog-info.yaml; then
              :  # already annotated, leave alone
            else
              # Insert under metadata.annotations (create the section if
              # missing). Uses awk because catalog-info.yaml may or may
              # not already have an annotations: block.
              python3 - <<'PY'
          import re, sys
          p = "catalog-info.yaml"
          with open(p) as f: s = f.read()
          if "annotations:" in s:
            # add line inside existing annotations block
            s = re.sub(
              r"(\n\s*annotations:\s*\n)",
              r"\1    backstage.io/techdocs-ref: dir:.\n",
              s, count=1)
          else:
            # add a fresh annotations block right after metadata:
            s = re.sub(
              r"(\nmetadata:\s*\n)",
              r"\1  annotations:\n    backstage.io/techdocs-ref: dir:.\n",
              s, count=1)
          with open(p, "w") as f: f.write(s)
          PY
            fi

            branch="chore/backstage-techdocs-onboard"
            git checkout -b "$branch"
            git add mkdocs.yml docs/index.md catalog-info.yaml
            git commit -m "chore: onboard to Backstage TechDocs

          Adds mkdocs.yml + docs/index.md (seeded from README) and the
          backstage.io/techdocs-ref annotation so the Docs tab in
          Backstage renders for this entity. Auto-generated by
          olafkfreund/backstage techdocs-onboard.yml — safe to merge
          as-is; edit docs/index.md to expand."
            git push -u origin "$branch"

            gh pr create \
              --repo "olafkfreund/${name}" \
              --base "$default_branch" \
              --head "$branch" \
              --title "chore: onboard TechDocs" \
              --body "Adds Backstage TechDocs scaffolding:

          - \`mkdocs.yml\` with techdocs-core plugin
          - \`docs/index.md\` seeded from this repo's README.md
          - \`backstage.io/techdocs-ref: dir:.\` annotation on the Component

          After merge, the Docs tab on this repo's entity in Backstage
          (https://p510.tail833f7.ts.net/backstage) will render the
          README and any additional \`docs/*.md\` files via MkDocs.

          Auto-generated by [olafkfreund/backstage techdocs-onboard workflow](https://github.com/olafkfreund/backstage/blob/main/.github/workflows/techdocs-onboard.yml)." \
              || echo "::warning::PR creation failed for $name"

            cd /tmp
            rm -rf "$tmpdir"
            trap - EXIT
          done < to_onboard.jsonl

      - name: Summary
        if: always()
        run: |
          echo "## TechDocs onboard summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- This run: ${{ steps.pick.outputs.count || 0 }} repos" >> "$GITHUB_STEP_SUMMARY"
          echo "- Remaining: ${{ steps.pick.outputs.remaining || 0 }} repos" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry-run: ${{ env.DRY_RUN }}" >> "$GITHUB_STEP_SUMMARY"
