app:
  baseUrl: ${BACKSTAGE_PUBLIC_URL}

backend:
  baseUrl: ${BACKSTAGE_PUBLIC_URL}
  listen:
    port: 7007
    host: 0.0.0.0
  cors:
    origin: ${BACKSTAGE_PUBLIC_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  environment: production
  allowGuestAccess: true
  providers:
    guest: {}
    github:
      production:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName
            - resolver: emailMatchingUserEntityProfileEmail

catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, User, Group, Template]
  locations:
    - type: url
      target: https://github.com/olafkfreund/nixos_config/blob/main/catalog-info.yaml
      rules:
        - allow: [Component, System]
