app:
  baseUrl: ${BACKSTAGE_PUBLIC_URL}
  # Frontend extension config: default the catalog-graph root entity so the
  # page renders something useful when visited directly (no URL params).
  # The Sidebar still deep-links with ?rootEntityRefs[]=... when clicked.
  extensions:
    - page:catalog-graph:
        config:
          rootEntityRefs:
            - group:default/olafkfreund
          maxDepth: 2
    # Hide the github-insights Compliance card — it just nags about
    # missing branch protection rules + LICENSE files on every entity
    # overview. The signal is real but the UX is noisy. Re-enable by
    # changing `false` → `true` once every repo has both.
    - entity-card:github-insights/compliance: false

backend:
  baseUrl: ${BACKSTAGE_PUBLIC_URL}
  listen:
    port: 7007
    host: 0.0.0.0
  cors:
    origin: ${BACKSTAGE_PUBLIC_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  csp:
    # Backstage / Helmet defaults block external images, so README badges
    # (shields.io, github.com action badges) and embedded screenshots
    # (raw.githubusercontent.com) appear as broken-image alt text in the
    # github-insights and Catalog README cards. Permissive img-src lets
    # any https image load — for a single-user home lab the tradeoff
    # (a malicious README could embed a tracking pixel) is acceptable.
    # connect-src kept permissive so plugins that fetch external APIs
    # (security-insights, github-actions) keep working.
    connect-src: ["'self'", 'http:', 'https:']
    img-src: ["'self'", 'data:', 'https:']
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
  auth:
    # Single-user self-host: no service-to-service backends to authenticate.
    # Without this, Backstage 1.30+ rejects every /api/* call (including
    # frontend → catalog) with 401. For a multi-tenant deployment with
    # external backends, configure backend.auth.keys + externalAccess
    # instead.
    dangerouslyDisableDefaultAuthPolicy: true
    # External access for MCP clients: static bearer token (sourced from
    # agenix via the env-bridge in modules/services/backstage.nix).
    # MCP-aware AI clients (Claude Code, Cursor, etc.) connect to
    # /api/mcp-actions/v1 with Authorization: Bearer ${MCP_TOKEN}.
    externalAccess:
      - type: static
        options:
          token: ${MCP_TOKEN}
          subject: mcp-clients
        accessRestrictions:
          - plugin: mcp-actions
          - plugin: catalog
          - plugin: scaffolder
          - plugin: techdocs

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}
  # GitLab integration — token unset by default. To activate: create an
  # agenix secret backstage-gitlab-token, add to secret-to-env bridge in
  # modules/services/backstage.nix, and the @immobiliarelabs/backstage-
  # plugin-gitlab UI will start populating. Without a token the plugin
  # loads but every GitLab-tab fetch returns 401.
  gitlab:
    - host: gitlab.com
      token: ${GITLAB_TOKEN:-}

auth:
  environment: production
  allowGuestAccess: true
  providers:
    guest: {}
    github:
      production:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        signIn:
          resolvers:
            # Single-user self-host: match GitHub username (olafkfreund)
            # against the User entity in nixos_config/catalog-info.yaml.
            # The email-matching fallback was dropped because olafkfreund's
            # GitHub profile email is private/unverified for OAuth scope,
            # which threw "user profile does not contain an email" instead
            # of failing cleanly to this resolver.
            - resolver: usernameMatchingUserEntityName

techdocs:
  # Local builder: backend runs `mkdocs build` inline against the repo
  # checkout. First view of a doc takes ~10s while mkdocs renders; cached
  # after that. Cache dir is `techdocs.cache.path` (defaults to /tmp,
  # we override to a persistent volume so it survives container restarts).
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'
  cache:
    ttlMinutes: 1440  # 1 day
  # When a repo's mkdocs.yml lives at the entity's repo root, the entity
  # needs `metadata.annotations: backstage.io/techdocs-ref: dir:.`
  # to point at it. The techdocs-onboard workflow in olafkfreund/backstage
  # adds this automatically to every onboarded repo.

# MCP Actions: expose catalog + scaffolder + techdocs tools to AI agents
# over the Model Context Protocol. Endpoints (multi-server form):
#   /api/mcp-actions/v1/catalog    — catalog:* tools
#   /api/mcp-actions/v1/scaffolder — scaffolder:* tools
#   /api/mcp-actions/v1/techdocs   — techdocs:* tools
# Auth: Authorization: Bearer ${MCP_TOKEN} (configured under
# backend.auth.externalAccess above; MCP_TOKEN comes from the env-bridge
# in modules/services/backstage.nix, sourced from agenix).
mcpActions:
  name: 'freundcloud Backstage'
  servers:
    catalog:
      name: 'Catalog'
      filter:
        include:
          - id: 'catalog:*'
    scaffolder:
      name: 'Scaffolder'
      filter:
        include:
          - id: 'scaffolder:*'
    techdocs:
      name: 'TechDocs'
      filter:
        include:
          - id: 'techdocs:*'

catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, User, Group, Template]
  locations:
    # Seed catalog: User entity for olafkfreund (so sign-in resolvers find a
    # matching User on first GitHub OAuth login) and any hand-edited
    # entities live alongside the .nix config.
    - type: url
      target: https://github.com/olafkfreund/nixos_config/blob/main/catalog-info.yaml
      rules:
        - allow: [Component, System, User, Group]

    # Software templates — register each template.yaml as a Location so it
    # appears in the Scaffolder (/create) UI. Skeletons live alongside in
    # templates/<name>/content/ and are fetched at scaffold time.
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/rust-service/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/python-service/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/typescript-service/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/cosmic-applet/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/nixos-module/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/terraform-aws/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/terraform-gcp/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/terraform-azure/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/kubernetes-gcp-gke/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/kubernetes-aws-eks/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/olafkfreund/backstage/blob/main/templates/kubernetes-azure-aks/template.yaml
      rules:
        - allow: [Template]
  providers:
    # GitHubEntityProvider scans olafkfreund's repos and ingests every
    # `catalog-info.yaml` it finds. Repos without one are silent — the
    # catalog-onboard.yml workflow in this repo opens PRs adding one to
    # repos that haven't been onboarded yet (batched 10/day to avoid
    # flooding).
    github:
      olafkfreundAllRepos:
        # Personal account, not org — Backstage queries /users/X/repos.
        organization: olafkfreund
        catalogPath: /catalog-info.yaml
        # No filters → forks + archives included per #731 epic decisions.
        # filters: {}  # uncomment to narrow later
        schedule:
          frequency: { hours: 1 }
          timeout: { minutes: 3 }
    # GitlabDiscoveryEntityProvider — scans gitlab.com for catalog-info.yaml
    # files. group="" + project="" means: scan everything the configured
    # GITLAB_TOKEN can see. Narrow by setting `group: my-group` once you
    # have actual GitLab projects to onboard. Sits idle (no projects
    # discovered) if the token has no project access — harmless.
    gitlab:
      olafkfreundGitlab:
        host: gitlab.com
        branch: main
        fallbackBranch: master
        catalogFile: catalog-info.yaml
        # No `group` set → searches all accessible projects.
        # Set this to your group slug when you have GitLab projects to onboard.
        # group: my-group
        schedule:
          frequency: { hours: 1 }
          timeout: { minutes: 3 }
